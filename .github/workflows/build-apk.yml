name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      variant:
        description: 'Gradle variant to build'
        required: true
        default: 'FullDebug'
        type: choice
        options:
          - FullDebug
          - MinimalDebug
      clean:
        description: 'Run gradle clean before build'
        required: true
        default: false
        type: boolean

jobs:
  build:
    name: Build ${{ inputs.variant }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare Android SDK packages
        shell: bash
        run: |
          set -euxo pipefail
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            'platforms;android-37.0' \
            'build-tools;36.0.0' \
            'ndk;29.0.14206865' \
            'cmake;4.1.2'

      - name: Build APK
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x ./gradlew
          if [ "${{ inputs.clean }}" = "true" ]; then
            ./gradlew clean --no-daemon
          fi
          ./gradlew ":app:assemble${{ inputs.variant }}" --no-daemon --stacktrace

      - name: Collect APKs
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          find app/build/outputs/apk -type f -name '*.apk' -print -exec cp {} artifacts/ \;
          ls -lh artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: home-assistant-companion-${{ inputs.variant }}-apk
          path: artifacts/*.apk
          if-no-files-found: error
